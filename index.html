<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS-KOM Venue Booking</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px auto; padding: 10px; display: flex; flex-direction: column; gap: 30px; align-items: center; max-width: 1000px; background-color: #f4f7f8; }
        .container { width: 100%; background: #ffffff; border-radius: 8px; border: 1px solid #ddd; padding: 20px; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Header Image Styling */
        .header-banner { width: 100%; max-height: 315px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }

        .header-container { text-align: center; color: #333333; }
        .header-container h1 { margin: 0; font-size: 1.8em; }
        .header-container p { margin: 5px 0 0 0; opacity: 0.8; }
        h3 { margin-top: 0; border-bottom: 2px solid #0366d6; padding-bottom: 10px; display: inline-block;}
        input, select, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0366d6; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        button:hover { background: #0056b3; }
        button:disabled { background: #999; cursor: not-allowed; }
        
        /* Calendar Styling */
        .calendar-container { overflow-x: auto; }
        .fc .fc-button { font-size: 0.85em !important; padding: 4px 8px !important; }
        .fc-event-pending { background-color: #f39c12 !important; border-color: #e67e22 !important; }

        /* Upcoming Events Section styling */
        .upcoming-container h3 { margin-top: 0; border-bottom: 2px solid #0366d6; padding-bottom: 10px; display: inline-block; }
        .event-list { list-style-type: none; padding: 0; margin: 0; display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .event-card { padding: 15px; background: #f9f9f9; border-left: 5px solid #0366d6; border-radius: 4px; border: 1px solid #eaeaea; }
        .event-card strong { font-size: 1.1em; display: block; margin-bottom: 5px; color: #333; }
        .event-details { font-size: 0.9em; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container header-container">
        <img src="header3.jpg" alt="Department Banner" class="header-banner">
        
        <h1>BMS-KOM Venue Booking</h1>
        <p>Public Request Portal - For further enquiries, please contact afzalalias@iium.edu.my</p>
    </div>

    <div class="container form-container">
        <h3>Request a Venue</h3>
        <form id="activityForm">
            <label>Your Email Address (For approval updates)</label>
            <input type="email" id="email" required>

            <label>Activity Name</label>
            <input type="text" id="name" required>
            
            <label>Start Date & Time</label>
            <input type="datetime-local" id="startDatetime" required>

            <label>End Date & Time</label>
            <input type="datetime-local" id="endDatetime" required>
            
            <label>Location</label>
            <select id="locationSelect" required>
                <option value="" disabled selected>Select a location</option>
                
                <optgroup label="Anatomage">
                    <option value="Anatomage 1 @ Dissection Hall">Anatomage 1 @ Dissection Hall</option>
                    <option value="Anatomage 2 @ Medical Museum">Anatomage 2 @ Medical Museum</option>
                </optgroup>

                <optgroup label="Smartboard Rooms">
                    <option value="Smartboard 1 @ EM Projection Room (Level 1)">Smartboard 1 @ EM Projection Room (Level 1)</option>

                </optgroup>
                
            </select>
         
            <label>Department / Kulliyyah</label>
            <input type="text" id="team" required placeholder="Who are you booking for?">
            
            <button type="submit" id="submitBtn">Submit Booking Request</button>
        </form>
        <p id="statusMsg"></p>
    </div>

    <div class="container calendar-container">
        <div id="calendar"></div>
    </div>

    <div class="container upcoming-container">
        <h3>Upcoming Approved Activities</h3>
        <ul id="eventList" class="event-list">
            <li>Loading upcoming events...</li>
        </ul>
    </div>

    <script>
        // INSERT YOUR DEPLOYED APPS SCRIPT URL HERE
        const API_URL = 'https://script.google.com/macros/s/AKfycbwkVAmw_w3_DBeCG2Nmnonvei81nMvV1wwC7pNDy59jpDivDll_nkxtax1yamWcSyOP/exec'; 

        let currentEvents = []; 

        function isOverlapping(newStart, newEnd, venue) {
            const start = new Date(newStart).getTime();
            const end = new Date(newEnd).getTime();
            return currentEvents.some(event => {
                if (event.extendedProps.location === venue) {
                    const eventStart = new Date(event.start).getTime();
                    const eventEnd = event.end ? new Date(event.end).getTime() : eventStart + (60 * 60 * 1000); 
                    return (start < eventEnd && end > eventStart);
                }
                return false;
            });
        }

        function renderUpcomingEvents(eventsData) {
            const listEl = document.getElementById('eventList');
            listEl.innerHTML = ''; 

            const now = new Date();
            
            // Filters out past events AND unapproved pending events
            const upcoming = eventsData
                .filter(event => new Date(event.start) >= now && event.extendedProps.status === 'Approved')
                .sort((a, b) => new Date(a.start) - new Date(b.start));

            if (upcoming.length === 0) {
                listEl.innerHTML = '<li>No upcoming approved events at this time.</li>';
                return;
            }

            upcoming.forEach(event => {
                const li = document.createElement('li');
                li.className = 'event-card';
                
                const startDateObj = new Date(event.start);
                const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                const formattedDate = startDateObj.toLocaleDateString(undefined, dateOptions);

                li.innerHTML = `
                    <strong>${event.title}</strong>
                    <div class="event-details">
                        🕒 ${formattedDate}<br>
                        📍 ${event.extendedProps.location}
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Handle showing/hiding the "Other" location text field
            const locationSelect = document.getElementById('locationSelect');
            const locationOther = document.getElementById('locationOther');

            locationSelect.addEventListener('change', function() {
                if (this.value === 'Others') {
                    locationOther.style.display = 'block';
                    locationOther.required = true;
                } else {
                    locationOther.style.display = 'none';
                    locationOther.required = false;
                    locationOther.value = ''; 
                }
            });
            
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                displayEventTime: false, 
                headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                
                eventClassNames: function(arg) {
                    if (arg.event.extendedProps.status === 'Pending') return ['fc-event-pending'];
                    return [];
                },
                
                events: function(info, successCallback, failureCallback) {
                    fetch(API_URL + '?view=public&t=' + new Date().getTime())
                        .then(res => res.json())
                        .then(data => {
                            // 1. Keep ALL events in the background so overlap detection works for everything
                            currentEvents = data; 
                            
                            // 2. Filter the events that actually get shown on the calendar and list
                            const displayEvents = data.filter(event => {
                                const loc = (event.extendedProps.location || '').toLowerCase();
                                return loc.includes('anatomage') || loc.includes('smartboard');
                            });

                            successCallback(displayEvents);
                            renderUpcomingEvents(displayEvents); 
                        })
                        .catch(err => {
                            console.error('Error:', err);
                            failureCallback(err);
                            document.getElementById('eventList').innerHTML = '<li style="color:red;">Error loading events.</li>';
                        });
                },
                
                eventClick: function(info) {
                    let statusTxt = info.event.extendedProps.status === 'Pending' ? 'Pending Approval' : 'Approved (Booked)';
                    alert('Activity: ' + info.event.title + '\nVenue: ' + info.event.extendedProps.location + '\nStatus: ' + statusTxt);
                }
            });
            calendar.render();

            document.getElementById('activityForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const statusMsg = document.getElementById('statusMsg');
                
                const startDT = document.getElementById('startDatetime').value;
                const endDT = document.getElementById('endDatetime').value;
                const venue = locationSelect.value === 'Others' ? locationOther.value : locationSelect.value;
                
                if (new Date(startDT) >= new Date(endDT)) {
                    statusMsg.innerText = "End time must be after start time.";
                    statusMsg.style.color = "red"; return;
                }

                if (isOverlapping(startDT, endDT, venue)) {
                    statusMsg.innerText = "Venue is unavailable for this time. Please choose another slot.";
                    statusMsg.style.color = "red"; return;
                }

                btn.innerText = 'Submitting...';
                btn.disabled = true;

                const payload = {
                    type: 'public', 
                    email: document.getElementById('email').value,
                    name: document.getElementById('name').value,
                    startDatetime: startDT,
                    endDatetime: endDT,
                    location: venue,
                    team: document.getElementById('team').value
                };

                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' }
                }).then(() => {
                    statusMsg.innerText = "Request submitted! Pending approval.";
                    statusMsg.style.color = "green";
                    document.getElementById('activityForm').reset();
                    locationOther.style.display = 'none'; // Re-hide custom location input
                    btn.innerText = 'Submit Booking Request';
                    btn.disabled = false;
                    setTimeout(() => calendar.refetchEvents(), 1500); 
                    setTimeout(() => statusMsg.innerText = "", 5000);
                }).catch(err => {
                    statusMsg.innerText = "Error submitting.";
                    statusMsg.style.color = "red";
                    btn.innerText = 'Submit Booking Request';
                    btn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
